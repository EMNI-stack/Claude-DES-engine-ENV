<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Floor authoring self-test</title>
<style>
  body { font-family: ui-monospace, Menlo, Consolas, monospace; margin: 16px; color: #1b1d1a; }
  h1 { font-size: 16px; } #app { width: 1400px; height: 920px; border: 1px solid #ccc; }
  #out { white-space: pre-wrap; font-size: 12px; line-height: 1.5; }
  .PASS { color: #0F5F57; } .FAIL { color: #b5462f; font-weight: 600; }
  #sum { font-size: 14px; font-weight: 700; margin: 8px 0; }
</style>
</head>
<body>
<h1>Floor authoring self-test — drives the real Setup builder (mouse + keyboard) to build scenarios</h1>
<div id="sum">running…</div>
<pre id="out"></pre>
<iframe id="app" title="floor under test"></iframe>

<script>
/* Drives app/floor.html's Setup drawer (the system builder) via simulated clicks + keyboard,
   then asserts against the persisted model (localStorage des-study/v1) and the live clock/results
   after Apply. Proves the scenarios are buildable with mouse + keyboard in the new workflow.
   Run in a browser, or headless (parse #out / #sum / document.title). */
const out = document.getElementById('out'), sumEl = document.getElementById('sum');
const KEY = 'des-study/v1';
let pass = 0, fail = 0, rnav = 0;
const ok = (c, m) => { const s = document.createElement('span'); s.className = c ? 'PASS' : 'FAIL'; s.textContent = (c ? 'PASS ' : 'FAIL ') + m + '\n'; out.append(s); c ? pass++ : fail++; return c; };
const log = (s) => out.append(document.createTextNode(s + '\n'));
const sleep = (ms) => new Promise(r => setTimeout(r, ms));
let ifr, D, W;
function loadFloor() { return new Promise((res) => { ifr = document.getElementById('app'); ifr.onload = () => setTimeout(() => { D = ifr.contentDocument; W = ifr.contentWindow; res(); }, 350); ifr.src = '../../app/floor.html?r=' + (++rnav); }); }
async function reset() { try { localStorage.removeItem(KEY); } catch (e) {} await loadFloor(); }   // empty model auto-opens the Setup drawer
function model() { return JSON.parse(localStorage.getItem(KEY)).model; }

/* ---- drawer gestures ---- */
function clickByText(root, text) { for (const b of root.querySelectorAll('button')) if (b.textContent.trim() === text || b.textContent.includes(text)) { b.click(); return true; } return false; }
function addStation(label) { return clickByText(D.querySelector('#setupStations .setup-add'), '+ ' + label); }
function card(i) { return D.querySelectorAll('#setupStations .setup-card')[i]; }
function openCard(i) { const c = card(i); if (c && !c.classList.contains('open')) c.querySelector('.setup-card-h').click(); return card(i); }   // expand the accordion row before editing
function fieldInput(root, label) { for (const f of root.querySelectorAll('.field')) { const l = f.querySelector('label'); if (l && l.textContent.trim().toLowerCase() === label.toLowerCase()) return f.querySelector('input,select'); } return null; }
function setNum(root, label, v) { const i = fieldInput(root, label); if (!i) return false; i.value = String(v); i.dispatchEvent(new W.Event('input', { bubbles: true })); return true; }
function toggle(root, includes, checked) { for (const r of root.querySelectorAll('.toggle-row')) if (r.textContent.includes(includes)) { const cb = r.querySelector('input[type=checkbox]'); if (cb.checked !== checked) { cb.checked = checked; cb.dispatchEvent(new W.Event('change', { bubbles: true })); } return true; } return false; }
function routeAppend(partIdx, nodeId) { const blocks = D.querySelectorAll('#setupRoutes .route-block'); const sel = blocks[partIdx] && blocks[partIdx].querySelector('select'); if (!sel) return false; sel.value = nodeId; sel.dispatchEvent(new W.Event('change', { bubbles: true })); return true; }
function pmAddPart() { clickByText(D.getElementById('pmList'), '+ Add part'); }
function pmSelectPart(i) { const items = D.querySelectorAll('#pmList .pm-item'); if (items[i]) items[i].click(); }
function apply() { D.getElementById('setupApply').click(); }
function step(n) { for (let i = 0; i < n; i++) D.getElementById('btnStep').click(); }
const clkOut = () => parseInt(D.getElementById('clkOut').textContent) || 0;
const clkWip = () => parseInt(D.getElementById('clkWip').textContent) || 0;
function endRun() { D.getElementById('btnEnd').click(); }
const resultsText = () => D.getElementById('results').innerText;

async function S1_pushLine() {
  log('\n## S1 — push line built in the Setup drawer (stations + typed params + routes + Apply)');
  await reset();
  ok(!D.getElementById('setupDrawer').hidden, 'empty model auto-opened the Setup drawer');
  addStation('Source'); addStation('Workcenter'); addStation('Sink');
  setNum(openCard(0), 'mean', 2);     // source interarrival
  setNum(openCard(1), 'mean', 1.2);   // workcenter service
  const ids = model().nodes.map(n => n.id);
  ids.forEach(id => routeAppend(0, id));   // route the default part through all three
  apply();
  const m = model();
  ok(m.nodes.length === 3, 'three stations created (' + m.nodes.length + ')');
  ok(Math.abs(m.nodes[0].interarrival.params.mean - 2) < 1e-6, 'source mean persisted = ' + m.nodes[0].interarrival.params.mean);
  ok(Math.abs(m.nodes[1].service.params.mean - 1.2) < 1e-6, 'service mean persisted = ' + m.nodes[1].service.params.mean);
  ok(m.parts[0].route.length === 3, 'route ordered via the Routes section (' + m.parts[0].route.length + ')');
  ok(D.getElementById('setupDrawer').hidden, 'Apply closed the drawer and laid out the floor');
  ok(m.nodes.every(n => typeof n.x === 'number'), 'auto-layout assigned coordinates');
  step(200); ok(clkOut() > 0, 'line runs — output = ' + clkOut());
}
async function S2_pullDemand() {
  log('\n## S2 — pull / CONWIP with per-product demand (control + parts editor)');
  await reset();
  addStation('Source'); addStation('Workcenter'); addStation('Sink');
  setNum(openCard(0), 'mean', 1.5); setNum(openCard(1), 'mean', 1.2);
  model().nodes.map(n => n.id).forEach(id => routeAppend(0, id));
  clickByText(D.getElementById('controlBody'), 'CONWIP (pull)');
  pmSelectPart(0); toggle(D.getElementById('pmEditor'), 'Sold to customers', true);
  ok(model().control === 'conwip', 'control set to CONWIP via the Control section');
  ok(model().parts[0].demand.on === true, 'product marked sold (demand stream) in the Parts editor');
  apply(); step(300);
  ok(clkOut() > 0, 'pull line runs — output = ' + clkOut() + ', WIP = ' + clkWip());
}
async function S3_batch() {
  log('\n## S3 — batch processing (toggle batch in a workcenter card)');
  await reset();
  addStation('Source'); addStation('Workcenter'); addStation('Sink');
  setNum(openCard(0), 'mean', 2.5); setNum(openCard(1), 'mean', 4);
  ok(toggle(openCard(1), 'Process parts in batches', true), 'toggled batch on the workcenter');
  setNum(card(1), 'Batch size B', 3); setNum(card(1), 'Setup time (once per batch)', 2);
  model().nodes.map(n => n.id).forEach(id => routeAppend(0, id));
  const rb = model().nodes[1].batch;
  ok(rb && rb.on && rb.size === 3 && rb.setup === 2, 'batch {on, B=3, setup=2} persisted');
  apply(); step(400); endRun();
  ok(clkOut() > 0, 'batch line runs — output = ' + clkOut());
  ok(/batch/i.test(resultsText()), 'results surface batch state');
}
async function S4_assembly() {
  log('\n## S4 — multi-part assembly (stations + assembly flag + 3 parts + BOM + per-part routes)');
  await reset();
  addStation('Source'); addStation('Source'); addStation('Workcenter'); addStation('Sink');
  ok(toggle(openCard(2), 'Assembly station', true), 'toggled the workcenter to an assembly station');
  pmAddPart(); pmAddPart();   // product (default) + two components
  const parts = model().parts; const prodId = parts[0].id;
  pmSelectPart(1); clickByText(D.getElementById('pmEditor'), 'Bought');
  pmSelectPart(2); clickByText(D.getElementById('pmEditor'), 'Bought');
  pmSelectPart(0);
  clickByText(D.getElementById('pmEditor'), '+ component'); clickByText(D.getElementById('pmEditor'), '+ component');
  const comps = model().parts.filter(p => p.id !== prodId);
  const selects = D.querySelectorAll('#pmEditor .bom-row select');
  ok(selects.length === 2, 'product has two BOM rows (' + selects.length + ')');
  selects[0].value = comps[0].id; selects[0].dispatchEvent(new W.Event('change', { bubbles: true }));
  selects[1].value = comps[1].id; selects[1].dispatchEvent(new W.Event('change', { bubbles: true }));
  const ids = model().nodes.map(n => n.id);   // [srcA, srcB, assy, sink]
  routeAppend(0, ids[2]); routeAppend(0, ids[3]);   // product: assy → sink
  routeAppend(1, ids[0]); routeAppend(1, ids[2]);   // comp1: srcA → assy
  routeAppend(2, ids[1]); routeAppend(2, ids[2]);   // comp2: srcB → assy
  const m = model();
  ok(m.parts.length === 3, 'three parts authored (' + m.parts.length + ')');
  ok(m.parts.find(p => p.id === prodId).bom.length === 2, 'product BOM has 2 components');
  ok(m.nodes[2].assembly === true, 'assembly flag set on the workcenter');
  apply(); step(500);
  ok(clkOut() > 0, 'assembly model runs — output = ' + clkOut());
}

(async () => {
  for (const sc of [S1_pushLine, S2_pullDemand, S3_batch, S4_assembly]) { try { await sc(); } catch (e) { ok(false, sc.name + ' threw: ' + (e && e.message)); } }
  const summary = `RESULT pass=${pass} fail=${fail}`;
  sumEl.textContent = summary; sumEl.className = fail ? 'FAIL' : 'PASS'; document.title = summary; log('\n' + summary);
})();
</script>
</body>
</html>
